name: DB · Deploy to STAGING

# Al mergear a main: aplica automáticamente las migraciones pendientes a STAGING.
# Desarrollas y validas siempre primero aquí (regla de oro de DEPLOYMENT.md).
on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

concurrency:
  group: db-staging
  cancel-in-progress: false

env:
  STAGING_PROJECT_REF: liszyjbqdyjtitamtrnt

jobs:
  push-staging:
    name: supabase db push (staging)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link & push to Staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
        run: |
          supabase link --project-ref "$STAGING_PROJECT_REF" --password "$STAGING_DB_PASSWORD"
          supabase db push --password "$STAGING_DB_PASSWORD"
