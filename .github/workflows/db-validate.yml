name: DB · Validate migrations

# Gate de PR (status check requerido). Corre en TODOS los PRs para que el
# check siempre reporte; el trabajo pesado solo se ejecuta si cambian
# migraciones. Aplica todas las migraciones sobre Postgres limpia: si no
# aplican desde cero (orden, sintaxis, dependencias) el PR no mergea.
on:
  pull_request:

jobs:
  validate-migrations:
    name: validate-migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect migration changes
        id: changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$BASE" "$HEAD" | grep -E '^supabase/(migrations/|config.toml)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No hay cambios de migraciones: validacion omitida (check verde)."
          fi

      - name: Setup Supabase CLI
        if: steps.changes.outputs.changed == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Postgres (Supabase)
        if: steps.changes.outputs.changed == 'true'
        run: supabase db start

      - name: Apply ALL migrations from scratch
        if: steps.changes.outputs.changed == 'true'
        run: supabase db reset --no-seed

      - name: Lint database
        if: steps.changes.outputs.changed == 'true'
        run: supabase db lint --level warning

      - name: Stop
        if: always() && steps.changes.outputs.changed == 'true'
        run: supabase stop --no-backup
