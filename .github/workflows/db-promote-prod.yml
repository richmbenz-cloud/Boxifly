name: DB · Promote to PRODUCTION

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe "PROMOTE" para confirmar el push a PRODUCCIÓN'
        required: true
        default: ''

concurrency:
  group: db-prod
  cancel-in-progress: false

env:
  PROD_PROJECT_REF: pdnflyuuxstobkhtqutp

jobs:
  push-prod:
    name: supabase db push (production)
    if: ${{ github.event.inputs.confirm == 'PROMOTE' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link & push to Production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
        run: |
          supabase link --project-ref "$PROD_PROJECT_REF" --password "$PROD_DB_PASSWORD"
          supabase migration repair --status reverted 20260623120000 --password "$PROD_DB_PASSWORD"
          supabase db push --password "$PROD_DB_PASSWORD"
